<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Crop Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            }
            50% {
                box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.6;
        }
        
        input[type="number"] {
            padding-left: 2.5rem !important;
        }
        
        .result-card {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .bg-pattern {
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#10b981',
                        'secondary': '#1f2937',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-pattern">

    <div class="w-full max-w-2xl bg-white/95 backdrop-blur-sm shadow-2xl rounded-2xl p-10 space-y-8 fade-in-up">
        <!-- Header -->
        <header class="text-center">
            <div class="mb-4 text-6xl">🌾</div>
            <h1 class="text-5xl font-extrabold bg-gradient-to-r from-emerald-600 to-green-500 bg-clip-text text-transparent tracking-tight">
                Smart Crop Predictor
            </h1>
            <p class="mt-3 text-lg text-gray-600">
                Enter your soil and environmental parameters to get an AI-powered recommendation
            </p>
        </header>

        <!-- Prediction Form -->
        <form id="predictionForm" class="grid grid-cols-2 gap-x-6 gap-y-6">
            
            <!-- N (Nitrogen) -->
            <div class="input-group">
                <label for="N" class="block text-sm font-semibold text-gray-700 mb-2">Nitrogen (N)</label>
                <span class="input-icon">🧪</span>
                <input type="number" id="N" name="N" step="any" required
                    class="block w-full rounded-xl border-2 border-gray-200 shadow-sm focus:border-emerald-400 focus:ring-emerald-400 p-3 bg-white/80 transition-all duration-200 hover:border-emerald-300"
                    placeholder="kg/ha (e.g., 90)">
            </div>

            <!-- P (Phosphorus) -->
            <div class="input-group">
                <label for="P" class="block text-sm font-semibold text-gray-700 mb-2">Phosphorus (P)</label>
                <span class="input-icon">⚗️</span>
                <input type="number" id="P" name="P" step="any" required
                    class="block w-full rounded-xl border-2 border-gray-200 shadow-sm focus:border-emerald-400 focus:ring-emerald-400 p-3 bg-white/80 transition-all duration-200 hover:border-emerald-300"
                    placeholder="kg/ha (e.g., 42)">
            </div>

            <!-- K (Potassium) -->
            <div class="input-group">
                <label for="K" class="block text-sm font-semibold text-gray-700 mb-2">Potassium (K)</label>
                <span class="input-icon">💊</span>
                <input type="number" id="K" name="K" step="any" required
                    class="block w-full rounded-xl border-2 border-gray-200 shadow-sm focus:border-emerald-400 focus:ring-emerald-400 p-3 bg-white/80 transition-all duration-200 hover:border-emerald-300"
                    placeholder="kg/ha (e.g., 43)">
            </div>

            <!-- Temperature -->
            <div class="input-group">
                <label for="temperature" class="block text-sm font-semibold text-gray-700 mb-2">Temperature</label>
                <span class="input-icon">🌡️</span>
                <input type="number" id="temperature" name="temperature" step="any" required
                    class="block w-full rounded-xl border-2 border-gray-200 shadow-sm focus:border-emerald-400 focus:ring-emerald-400 p-3 bg-white/80 transition-all duration-200 hover:border-emerald-300"
                    placeholder="°C (e.g., 20.87)">
            </div>
            
            <!-- Humidity -->
            <div class="input-group">
                <label for="humidity" class="block text-sm font-semibold text-gray-700 mb-2">Humidity</label>
                <span class="input-icon">💧</span>
                <input type="number" id="humidity" name="humidity" step="any" required
                    class="block w-full rounded-xl border-2 border-gray-200 shadow-sm focus:border-emerald-400 focus:ring-emerald-400 p-3 bg-white/80 transition-all duration-200 hover:border-emerald-300"
                    placeholder="% (e.g., 82.0)">
            </div>

            <!-- pH -->
            <div class="input-group">
                <label for="ph" class="block text-sm font-semibold text-gray-700 mb-2">pH Level</label>
                <span class="input-icon">🧬</span>
                <input type="number" id="ph" name="ph" step="any" required
                    class="block w-full rounded-xl border-2 border-gray-200 shadow-sm focus:border-emerald-400 focus:ring-emerald-400 p-3 bg-white/80 transition-all duration-200 hover:border-emerald-300"
                    placeholder="Acidity (e.g., 6.5)">
            </div>

            <!-- Submit Button (Full Width) -->
            <div class="col-span-2 mt-4">
                <button type="submit" id="submitButton"
                    class="w-full flex justify-center items-center gap-2 py-4 px-6 border border-transparent rounded-xl shadow-lg text-xl font-bold text-white bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 focus:outline-none focus:ring-4 focus:ring-emerald-300 transition-all duration-200 transform hover:scale-105 active:scale-95">
                    <span>🔍</span>
                    Get Recommendation
                </button>
            </div>
        </form>

        <!-- Result Display -->
        <div id="resultContainer" class="mt-6 hidden">
            <div class="bg-gradient-to-br from-emerald-50 to-green-50 rounded-2xl p-8 border-2 border-emerald-200">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center flex items-center justify-center gap-2">
                    <span>✨</span>
                    <span>Recommended Crop</span>
                </h2>
                <div id="recommendationText" class="text-5xl font-black text-center p-6 bg-white rounded-xl text-emerald-600 result-card shadow-lg"></div>
                <p id="errorText" class="text-lg font-medium text-center p-4 bg-red-100 rounded-xl text-red-700 hidden mt-4"></p>
            </div>
        </div>
        
        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="text-center p-8 hidden">
            <div class="flex flex-col items-center">
                <svg class="animate-spin h-12 w-12 text-emerald-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-700 text-lg font-semibold">🌱 Analyzing your parameters...</p>
                <p class="text-gray-500 text-sm mt-1">Our AI is finding the perfect crop for you</p>
            </div>
        </div>

    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const resultContainer = document.getElementById('resultContainer');
        const recommendationText = document.getElementById('recommendationText');
        const errorText = document.getElementById('errorText');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const submitButton = document.getElementById('submitButton');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Clear previous results and show loading
            resultContainer.classList.add('hidden');
            errorText.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            submitButton.disabled = true;

            const formData = new FormData(form);
            const data = {};
            
            // Collect form data, converting string inputs to floats
            formData.forEach((value, key) => {
                data[key] = parseFloat(value);
            });

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Success
                    recommendationText.textContent = result.recommendation;
                    resultContainer.classList.remove('hidden');
                } else {
                    // Error from Flask (e.g., missing parameter)
                    errorText.textContent = result.error || 'An unknown error occurred during prediction.';
                    errorText.classList.remove('hidden');
                    resultContainer.classList.remove('hidden');
                    recommendationText.textContent = '';
                }

            } catch (error) {
                // Network or client-side error
                errorText.textContent = 'Could not connect to the server. Please ensure the Flask app is running.';
                errorText.classList.remove('hidden');
                resultContainer.classList.remove('hidden');
                recommendationText.textContent = '';
            } finally {
                // Hide loading and re-enable button
                loadingIndicator.classList.add('hidden');
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
