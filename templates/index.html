<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#10b981', /* Emerald */
                        'secondary': '#1f2937', /* Gray-800 */
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl bg-white shadow-2xl rounded-xl p-8 space-y-8">
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-4xl font-extrabold text-primary tracking-tight">
                Smart Crop Predictor
            </h1>
            <p class="mt-2 text-lg text-gray-500">
                Enter your soil and environmental parameters to get a recommendation.
            </p>
        </header>

        <!-- Prediction Form -->
        <form id="predictionForm" class="grid grid-cols-2 gap-x-6 gap-y-4">
            
            <!-- N (Nitrogen) -->
            <div>
                <label for="N" class="block text-sm font-medium text-secondary">Nitrogen (N) - kg/ha</label>
                <input type="number" id="N" name="N" step="any" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary p-3 bg-gray-50 transition duration-150 ease-in-out"
                    placeholder="e.g., 90">
            </div>

            <!-- P (Phosphorus) -->
            <div>
                <label for="P" class="block text-sm font-medium text-secondary">Phosphorus (P) - kg/ha</label>
                <input type="number" id="P" name="P" step="any" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary p-3 bg-gray-50"
                    placeholder="e.g., 42">
            </div>

            <!-- K (Potassium) -->
            <div>
                <label for="K" class="block text-sm font-medium text-secondary">Potassium (K) - kg/ha</label>
                <input type="number" id="K" name="K" step="any" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary p-3 bg-gray-50"
                    placeholder="e.g., 43">
            </div>

            <!-- Temperature -->
            <div>
                <label for="temperature" class="block text-sm font-medium text-secondary">Temperature - °C</label>
                <input type="number" id="temperature" name="temperature" step="any" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary p-3 bg-gray-50"
                    placeholder="e.g., 20.87">
            </div>
            
            <!-- Humidity -->
            <div>
                <label for="humidity" class="block text-sm font-medium text-secondary">Humidity - %</label>
                <input type="number" id="humidity" name="humidity" step="any" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary p-3 bg-gray-50"
                    placeholder="e.g., 82.0">
            </div>

            <!-- pH -->
            <div>
                <label for="ph" class="block text-sm font-medium text-secondary">pH Level (Acidity)</label>
                <input type="number" id="ph" name="ph" step="any" required
                    class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-primary focus:ring-primary p-3 bg-gray-50"
                    placeholder="e.g., 6.5">
            </div>

            <!-- Submit Button (Full Width) -->
            <div class="col-span-2">
                <button type="submit" id="submitButton"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-lg font-medium text-white bg-primary hover:bg-emerald-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-150 ease-in-out">
                    Get Recommendation
                </button>
            </div>
        </form>

        <!-- Result Display -->
        <div id="resultContainer" class="mt-8 pt-6 border-t border-gray-200 hidden">
            <h2 class="text-xl font-semibold text-secondary mb-3">Recommendation:</h2>
            <p id="recommendationText" class="text-3xl font-extrabold text-center p-4 bg-primary/10 rounded-lg text-primary"></p>
            <p id="errorText" class="text-lg font-medium text-center p-4 bg-red-100 rounded-lg text-red-700 hidden"></p>
        </div>
        
        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="text-center p-4 hidden">
            <svg class="animate-spin h-6 w-6 text-primary mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-secondary mt-2">Analyzing parameters...</p>
        </div>

    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const resultContainer = document.getElementById('resultContainer');
        const recommendationText = document.getElementById('recommendationText');
        const errorText = document.getElementById('errorText');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const submitButton = document.getElementById('submitButton');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Clear previous results and show loading
            resultContainer.classList.add('hidden');
            errorText.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            submitButton.disabled = true;

            const formData = new FormData(form);
            const data = {};
            
            // Collect form data, converting string inputs to floats
            formData.forEach((value, key) => {
                data[key] = parseFloat(value);
            });

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Success
                    recommendationText.textContent = result.recommendation;
                    resultContainer.classList.remove('hidden');
                } else {
                    // Error from Flask (e.g., missing parameter)
                    errorText.textContent = result.error || 'An unknown error occurred during prediction.';
                    errorText.classList.remove('hidden');
                    resultContainer.classList.remove('hidden');
                    recommendationText.textContent = '';
                }

            } catch (error) {
                // Network or client-side error
                errorText.textContent = 'Could not connect to the server. Please ensure the Flask app is running.';
                errorText.classList.remove('hidden');
                resultContainer.classList.remove('hidden');
                recommendationText.textContent = '';
            } finally {
                // Hide loading and re-enable button
                loadingIndicator.classList.add('hidden');
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
