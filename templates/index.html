<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Crop Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(34, 197, 94, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(74, 222, 128, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 30px rgba(16, 185, 129, 0.6), 0 0 60px rgba(16, 185, 129, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(16, 185, 129, 0.8), 0 0 80px rgba(16, 185, 129, 0.4);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.6;
        }
        
        input[type="number"] {
            padding-left: 2.5rem !important;
        }
        
        .result-card {
            animation: pulse-glow 2s ease-in-out infinite;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#10b981',
                        'secondary': '#1f2937',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-gradient-to-br from-emerald-50 via-green-50 to-teal-50 shadow-2xl rounded-3xl p-10 space-y-8 fade-in-up border-4 border-emerald-200" style="position: relative; z-index: 10;">
        <!-- Header -->
        <header class="text-center">
            <div class="mb-4 text-7xl animate-bounce">🌾</div>
            <h1 class="text-6xl font-black bg-gradient-to-r from-green-700 via-emerald-600 to-teal-600 bg-clip-text text-transparent tracking-tight drop-shadow-lg">
                Smart Crop Predictor
            </h1>
            <p class="mt-3 text-xl font-medium text-gray-700">
                🌱 Enter your soil and environmental parameters to get an AI-powered recommendation 🌿
            </p>
        </header>

        <!-- Prediction Form -->
        <form id="predictionForm" class="grid grid-cols-2 gap-x-6 gap-y-6">
            
            <!-- N (Nitrogen) -->
            <div class="input-group">
                <label for="N" class="block text-sm font-bold text-emerald-800 mb-2">Nitrogen (N) - ppm</label>
                <span class="input-icon">🧪</span>
                <input type="number" id="N" name="N" step="any" required
                    class="block w-full rounded-xl border-3 border-emerald-300 shadow-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-200 p-3 bg-white transition-all duration-200 hover:border-emerald-400 hover:shadow-xl"
                    placeholder="ppm (e.g., 90)">
            </div>

            <!-- P (Phosphorus) -->
            <div class="input-group">
                <label for="P" class="block text-sm font-bold text-emerald-800 mb-2">Phosphorus (P) - ppm</label>
                <span class="input-icon">⚗️</span>
                <input type="number" id="P" name="P" step="any" required
                    class="block w-full rounded-xl border-3 border-emerald-300 shadow-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-200 p-3 bg-white transition-all duration-200 hover:border-emerald-400 hover:shadow-xl"
                    placeholder="ppm (e.g., 42)">
            </div>

            <!-- K (Potassium) -->
            <div class="input-group">
                <label for="K" class="block text-sm font-bold text-emerald-800 mb-2">Potassium (K) - ppm</label>
                <span class="input-icon">💊</span>
                <input type="number" id="K" name="K" step="any" required
                    class="block w-full rounded-xl border-3 border-emerald-300 shadow-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-200 p-3 bg-white transition-all duration-200 hover:border-emerald-400 hover:shadow-xl"
                    placeholder="ppm (e.g., 43)">
            </div>

            <!-- Temperature -->
            <div class="input-group">
                <label for="temperature" class="block text-sm font-bold text-emerald-800 mb-2">Temperature</label>
                <span class="input-icon">🌡️</span>
                <input type="number" id="temperature" name="temperature" step="any" required
                    class="block w-full rounded-xl border-3 border-emerald-300 shadow-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-200 p-3 bg-white transition-all duration-200 hover:border-emerald-400 hover:shadow-xl"
                    placeholder="°C (e.g., 20.87)">
            </div>
            
            <!-- Humidity -->
            <div class="input-group">
                <label for="humidity" class="block text-sm font-bold text-emerald-800 mb-2">Humidity</label>
                <span class="input-icon">💧</span>
                <input type="number" id="humidity" name="humidity" step="any" required
                    class="block w-full rounded-xl border-3 border-emerald-300 shadow-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-200 p-3 bg-white transition-all duration-200 hover:border-emerald-400 hover:shadow-xl"
                    placeholder="% (e.g., 82.0)">
            </div>

            <!-- pH -->
            <div class="input-group">
                <label for="ph" class="block text-sm font-bold text-emerald-800 mb-2">pH Level</label>
                <span class="input-icon">🧬</span>
                <input type="number" id="ph" name="ph" step="any" required
                    class="block w-full rounded-xl border-3 border-emerald-300 shadow-lg focus:border-emerald-500 focus:ring-4 focus:ring-emerald-200 p-3 bg-white transition-all duration-200 hover:border-emerald-400 hover:shadow-xl"
                    placeholder="Acidity (e.g., 6.5)">
            </div>

            <!-- Submit Button (Full Width) -->
            <div class="col-span-2 mt-4">
                <button type="submit" id="submitButton"
                    class="w-full flex justify-center items-center gap-3 py-5 px-6 border-4 border-green-600 rounded-2xl shadow-2xl text-2xl font-black text-white bg-gradient-to-r from-green-600 via-emerald-500 to-teal-500 hover:from-green-700 hover:via-emerald-600 hover:to-teal-600 focus:outline-none focus:ring-4 focus:ring-yellow-300 transition-all duration-300 transform hover:scale-105 active:scale-95 hover:shadow-green-500/50">
                    <span class="text-3xl">🔍</span>
                    Get Crop Recommendation
                </button>
            </div>
        </form>

        <!-- Result Display -->
        <div id="resultContainer" class="mt-6 hidden">
            <div class="bg-gradient-to-br from-yellow-100 via-green-100 to-emerald-100 rounded-3xl p-10 border-4 border-yellow-400 shadow-2xl">
                <h2 class="text-3xl font-black text-green-800 mb-6 text-center flex items-center justify-center gap-3">
                    <span class="text-4xl">✨</span>
                    <span>Perfect Crop for Your Soil</span>
                    <span class="text-4xl">✨</span>
                </h2>
                <div id="recommendationText" class="text-6xl font-black text-center p-8 bg-gradient-to-r from-green-500 to-emerald-600 rounded-2xl text-white result-card shadow-2xl"></div>
                <p id="errorText" class="text-lg font-medium text-center p-4 bg-red-100 rounded-xl text-red-700 hidden mt-4 border-2 border-red-300"></p>
            </div>
        </div>
        
        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="text-center p-8 hidden">
            <div class="flex flex-col items-center">
                <svg class="animate-spin h-12 w-12 text-emerald-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-700 text-lg font-semibold">🌱 Analyzing your parameters...</p>
                <p class="text-gray-500 text-sm mt-1">Our AI is finding the perfect crop for you</p>
            </div>
        </div>

    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const resultContainer = document.getElementById('resultContainer');
        const recommendationText = document.getElementById('recommendationText');
        const errorText = document.getElementById('errorText');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const submitButton = document.getElementById('submitButton');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Clear previous results and show loading
            resultContainer.classList.add('hidden');
            errorText.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            submitButton.disabled = true;

            const formData = new FormData(form);
            const data = {};
            
            // Collect form data, converting string inputs to floats
            formData.forEach((value, key) => {
                data[key] = parseFloat(value);
            });

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    // Success
                    recommendationText.textContent = result.recommendation;
                    resultContainer.classList.remove('hidden');
                } else {
                    // Error from Flask (e.g., missing parameter)
                    errorText.textContent = result.error || 'An unknown error occurred during prediction.';
                    errorText.classList.remove('hidden');
                    resultContainer.classList.remove('hidden');
                    recommendationText.textContent = '';
                }

            } catch (error) {
                // Network or client-side error
                errorText.textContent = 'Could not connect to the server. Please ensure the Flask app is running.';
                errorText.classList.remove('hidden');
                resultContainer.classList.remove('hidden');
                recommendationText.textContent = '';
            } finally {
                // Hide loading and re-enable button
                loadingIndicator.classList.add('hidden');
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
